name: Update Blog Index

# 触发条件：当 push 到 main 分支，且修改了 blog/posts/ 目录下的文件
on:
  push:
    branches:
      - main
    paths:
      - 'blog/posts/**/*.md'
      - 'generate-meta.js'
      - 'package.json'

# 需要写入权限才能自动提交
permissions:
  contents: write

jobs:
  update-index:
    runs-on: ubuntu-latest
    
    steps:
      # 1. 检出代码
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      # 2. 设置 Node.js 环境
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      # 3. 安装依赖
      - name: Install dependencies
        run: npm ci
      
      # 4. 运行生成脚本
      - name: Generate meta.json
        run: node generate-meta.js
      
      # 5. 检查是否有变更，如有则提交并推送
      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add blog/meta.json
          git diff --staged --quiet || git commit -m "chore: auto-update blog index [skip ci]"
          git push